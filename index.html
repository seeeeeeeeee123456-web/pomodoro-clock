<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🍅 Pomodoro Timer</title>
        <link rel="stylesheet" href="pomodoro.css">
        <script src="pomodoro.js" defer></script>
    </head>

    <body>

        <div class="container">

           
            <h1>focus time</h1>
            <p class="subtitle">you got this!</p>

                        <div class="mode-buttons">
                <button class="mode-btn active" id="study-btn">study</button>
                <button class="mode-btn" id="break-btn">break</button>
            </div>

            
            <div class="timer-circle">
                <span id="timer">25:00</span>
            </div>

            
            <div class="controls">
                <button class="control-btn" id="start">start</button>
                <button class="control-btn" id="pause">pause</button>
                <button class="control-btn" id="reset">reset</button>
            </div>

            
            <p class="quote" id="quote">small steps, big dreams </p>

        </div>

<script>
  const quotes = [
    "Small progress is still progress.",
    "Focus on one thing at a time.",
    "Consistency beats motivation.",
    "Build it, then improve it."
  ];

  function changeQuote() {
    const randomIndex = Math.floor(Math.random() * quotes.length);
    document.getElementById("quote").textContent = quotes[randomIndex];
  }

  changeQuote();
  setInterval(changeQuote, 5000);
</script>
        
    </body>
</html>
